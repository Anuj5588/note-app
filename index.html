<!doctype html>
<html lang="en">
  <head>
    <script src="./index.js" defer></script>
    <link rel="stylesheet" href="./index.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Note-App</title>
  </head>
  <body>
    <div>
      <div id="header">
        <div class="logo">
          <div id="logo">
            <img
              src="./assets/note app example-logo-Photoroom.png"
              alt="logo"
            />
          </div>
          <div>
            <span class="sticky">Sticky</span> <span class="notes">Notes</span>
          </div>
        </div>

        <div class="logo">
          <div class="button"><img src="./assets/view (1).png" alt="" /></div>
          <div class="button">
            <img src="./assets/power-switch (1).png" alt="" />
          </div>
        </div>
      </div>

      <!-- hero section -->

      <div id="hero-section">
        <div class="side-bar">
          <div>
            <div class="side-bar-button">
              <div class="side-btn-1">Board</div>
              <div class="side-btn">
                <div class="side-btn-2" onclick="add()">+ Add New</div>
              </div>
            </div>
            <div></div>
          </div>
        </div>
        <div class="hero-right-section">
          <div id="notes-p"></div>
          <div id="modal">
            <div id="modal-content">
              <div class="heading-btn">
                <div>Create New Note</div>
                <div>X</div>
              </div>

              <div id="input-parent">
                <div id="title">
                  <div>Title</div>
                  <div class="input"><input /></div>
                </div>
                <div>
                  <div>Description</div>
                  <div><textarea id="note" rows="8" cols="44"></textarea></div>
                </div>

              </div>
                <div class="color-picker">
                  <div class="choose-color"><p>Choose Color:</p></div>
              
              <div class="colors">
                <div class="color yellow" data-color="#FFD54F"></div>
                <div class="color blue active" data-color="#4285F4"></div>

                <div class="color green" data-color="#66BB6A"></div>

                <div class="color red" data-color="#EF6C6C"></div>

                <div class="color purple" data-color="#9575CD"></div>
              </div>
            </div>
               <div id="buttons">
              <div class="btn-1"><div class="save">Save</div></div>
              <div class="btn-2"><div class="exit">Exit</div></div>
            </div>
            </div>
          
           
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
