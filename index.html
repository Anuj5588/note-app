<!doctype html>
<html lang="en">
  <head>
    <script src="./index.js" defer></script>
    <link rel="stylesheet" href="./index.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Note-App</title>
  </head>
  <body>
    <div>
      <div id="header">
        <div class="logo">
          <div id="logo">
            <img
              src="./assets/note app example-logo-Photoroom.png"
              alt="logo"
            />
          </div>
          <div>
            <span class="sticky">Sticky</span> <span class="notes">Notes</span>
          </div>
        </div>

        <div class="logo">
          <div class="button"><img src="./assets/view (1).png" alt="" /></div>
          <div class="button">
            <img src="./assets/power-switch (1).png" alt="" />
          </div>
        </div>
      </div>

      <!-- hero section -->

      <div id="hero-section">
        <div class="side-bar">
          <div>
            <div class="side-bar-button">
              <div class="side-btn-1">Board</div>
              <div class="side-btn">
                <div class="side-btn-2" onclick="add()">+ Add New</div>
              </div>
            </div>
            <div></div>
          </div>
        </div>
        <div class="hero-right-section">
        <div id="modal">
              <div>
                <div class="heading-btn">
                  <div>Create New Note</div>
                  <div>X</div>
                </div>
                <div>
                  <div>Title</div>
                  <input />
                </div>
                <div>
                  <div>
                    <div>Description</div>
                    <input />
                  </div>
                  <div>
                    <div></div>
                    <div></div>
                  </div>
                  <div>
                    <div></div>
                    <div></div>
                  </div>
                </div>
              </div>
            </div>
        </div>
      </div>
    </div>

</html>
